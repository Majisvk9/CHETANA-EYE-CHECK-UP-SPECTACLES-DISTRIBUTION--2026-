<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Camp Beneficiary Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.1);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 50px 20px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1e293b;
        }

        /* Modernized Form UI Styling */
        .form-card {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: var(--card-shadow);
            padding: 0;
            overflow: hidden;
            position: sticky;
            top: 50px;
        }

        .form-card-header {
            background: var(--primary-color);
            padding: 24px 35px;
            color: #ffffff;
        }

        .form-card-header h4 {
            margin: 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
        }

        .form-card-body {
            padding: 35px;
        }

        .form-label {
            font-weight: 600;
            color: #64748b;
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.75px;
        }

        .input-group {
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .input-group-text {
            background-color: #f8fafc;
            color: #94a3b8;
            border: 1px solid #cbd5e1;
            border-right: none;
            padding-left: 16px;
            padding-right: 12px;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            font-size: 0.95rem;
            color: #0f172a;
            background-color: #fff;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }

        .btn-submit {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border: none;
            font-weight: 600;
            padding: 15px;
            border-radius: 12px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }

        /* High-Precision Strict A4 Document Layout Wrapper */
        #a4Wrapper {
            width: 210mm;
            margin: 0 auto;
        }

        #a4Prescription {
            width: 210mm;
            height: 297mm;
            background: #ffffff;
            padding: 20mm 20mm;
            box-shadow: var(--card-shadow);
            color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .rx-header {
            text-align: center;
            border-bottom: 3px double #000000;
            padding-bottom: 12px;
            margin-bottom: 25px;
        }

        .rx-header h2 {
            margin: 0;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 2.1rem;
            color: #000000;
        }

        .meta-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            font-size: 0.95rem;
            margin-bottom: 25px;
            font-family: monospace, sans-serif;
        }

        /* Clinical Dynamic Upper Window Block */
        .patient-data-block {
            margin-bottom: 10px;
        }

        .rx-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1rem;
        }

        .rx-table td, .rx-table th {
            border: 1.5px solid #000000;
            padding: 14px 18px;
            vertical-align: middle;
        }

        /* Formatted Blank Clinical Space to consume workspace area cleanly */
        .blank-clinical-space {
            flex: 1 1 auto;
            border: 2px dashed #cbd5e1;
            margin: 30px 0;
            border-radius: 12px;
            position: relative;
            padding: 20px;
            background: #f8fafc;
        }

        .blank-clinical-space::before {
            content: "Rx / Treatment & Advice Notes";
            font-size: 1.1rem;
            font-weight: 700;
            color: #94a3b8;
            position: absolute;
            top: 20px;
            left: 20px;
        }

        /* Strict Non-Spill Footer Block */
        .prescription-footer {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .signature-row {
            display: flex;
            justify-content: space-between;
            padding-top: 60px;
        }

        .sig-box {
            text-align: center;
            width: 28%;
            font-size: 0.85rem;
        }

        .sig-line {
            border-top: 1.5px solid #000000;
            margin-bottom: 8px;
        }

        .action-btns {
            text-align: center;
            margin-top: 30px;
        }

        .action-btns .btn {
            padding: 14px 40px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.2s;
            background: #dc2626;
            border: none;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }
        
        .action-btns .btn:hover {
            transform: translateY(-2px);
            background: #b91c1c;
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.3);
        }

        /* Dynamic Scale Rules */
        @media(max-width: 1200px) {
            #a4Wrapper {
                width: 100%;
                max-width: 210mm;
            }
            #a4Prescription {
                width: 210mm;
                height: 297mm;
            }
        }
    </style>
</head>
<body>

<div class="container-fluid max-viewport-width">
    <div class="row justify-content-center g-4">
        
        <div class="col-xl-4 col-lg-5 col-md-12">
            <div class="form-card">
                <div class="form-card-header">
                    <h4><i class="fa-solid fa-id-card"></i> Registration Panel</h4>
                </div>
                <div class="form-card-body">
                    <form id="beneficiaryForm">
                        <input type="hidden" id="FormPatientId" name="PatientID">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                                <input type="text" class="form-control" id="Name" name="Name" placeholder="John Doe" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Gender</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-venus-mars"></i></span>
                                    <select class="form-select" id="Gender" name="Gender" required>
                                        <option value="">Select</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Age</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-cake-candles"></i></span>
                                    <input type="number" class="form-control" id="Age" name="Age" placeholder="Age" required>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contact Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                                <input type="text" class="form-control" id="ContactNo" name="ContactNo" placeholder="10-digit mobile">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Village</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-house-chimney"></i></span>
                                    <input type="text" class="form-control" id="Village" name="Village" placeholder="Village name">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Area / Location</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-location-dot"></i></span>
                                    <input type="text" class="form-control" id="AreaLocation" name="AreaLocation" placeholder="Sector/Block">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">HOF Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-users"></i></span>
                                    <input type="text" class="form-control" id="HOFName" name="HOFName" placeholder="Head of Family">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">HOF Occupation</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-briefcase"></i></span>
                                    <input type="text" class="form-control" id="HOFOccupation" name="HOFOccupation" placeholder="Occupation">
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Received Spectacles Previous Year?</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-glasses"></i></span>
                                <select class="form-select" id="ReceivedSpectaclesPreviousYear" name="ReceivedSpectaclesPreviousYear">
                                    <option value="">Select</option>
                                    <option value="Yes">Yes</option>
                                    <option value="No">No</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-submit btn-lg text-white">
                                <i class="fa-cloud-arrow-up fa-solid me-2"></i> Save Beneficiary Record
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-xl-8 col-lg-7 col-md-12">
            <div id="a4Wrapper">
                <div id="a4Prescription">
                    
                    <div>
                        <div class="rx-header">
                            <h2>EYE CAMP PRESCRIPTION</h2>
                        </div>
                        <div class="meta-info-grid">
                            <div><b>Patient ID :</b> <span id="patientId" style="color: #d32f2f; font-weight: bold;"></span></div>
                            <div class="text-end"><b>Date :</b> <span id="todayDate" style="font-weight: bold;"></span></div>
                        </div>
                    </div>

                    <div class="patient-data-block">
                        <table class="rx-table">
                            <tr>
                                <td width="25%"><b>Full Name</b></td>
                                <td id="pName" width="75%" style="font-size: 1.1rem; font-weight: 700; text-transform: uppercase;"></td>
                            </tr>
                            <tr>
                                <td width="25%"><b>Gender / Age</b></td>
                                <td width="75%"><span id="pGender"></span> / <span id="pAge"></span></td>
                            </tr>
                        </table>
                    </div>

                    <div class="blank-clinical-space"></div>

                    <div class="prescription-footer">
                        <div style="font-size: 0.85rem; border-top: 1.5px dashed #000000; padding-top: 12px; font-style: italic; color: #475569;">
                            <i class="fa-circle-check fa-solid text-success me-1"></i> 
                            Registered via authorized Eye Care Outreach Initiative program. Valid for camp diagnostic execution criteria workflow.
                        </div>
                        <div class="signature-row">
                            <div class="sig-box">
                                <div style="height: 50px;"></div>
                                <div class="sig-line"></div>
                                <b>Beneficiary Signature</b>
                            </div>
                            <div class="sig-box">
                                <div style="height: 50px;"></div>
                                <div class="sig-line"></div>
                                <b>Camp Coordinator</b>
                            </div>
                            <div class="sig-box">
                                <div style="height: 50px;"></div>
                                <div class="sig-line"></div>
                                <b style="color: #2563eb;"><i class="fa-solid fa-user-md me-1"></i> Ophthalmologist</b>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="action-btns">
                <button onclick="downloadPDF()" class="btn btn-danger btn-lg shadow-sm text-white">
                    <i class="fa-solid fa-file-pdf me-2"></i> Export PDF File
                </button>
            </div>
        </div>

    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysp2_DQlc5RhPR9KMSwvG91GveNxGg5V3dRKfIxIR5gLK8iZ_VbxlcXHJ2ZC_vSi2GCQ/exec";

    function initPrescriptionIdentifiers() {
        const d = new Date();
        const generatedID = "EC-" + d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0') + "-" + Math.floor(100 + Math.random() * 900);
        
        document.getElementById("patientId").innerHTML = generatedID;
        document.getElementById("FormPatientId").value = generatedID;
        document.getElementById("todayDate").innerHTML = d.toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function updatePreview() {
        document.getElementById("pName").innerHTML = document.getElementById("Name").value || "-";
        document.getElementById("pGender").innerHTML = document.getElementById("Gender").value || "-";
        document.getElementById("pAge").innerHTML = document.getElementById("Age").value ? document.getElementById("Age").value + " Yrs" : "-";
    }

    document.querySelectorAll("input, select").forEach(el => {
        el.addEventListener("input", updatePreview);
        el.addEventListener("change", updatePreview);
    });

    document.getElementById("beneficiaryForm").addEventListener("submit", function(e) {
        e.preventDefault();

        Swal.fire({
            title: 'Saving Records...',
            text: 'Uploading data securely to system directory.',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        const formData = new FormData(this);
        const searchParams = new URLSearchParams();
        for (const pair of formData) {
            searchParams.append(pair[0], pair[1]);
        }

        fetch(SCRIPT_URL, {
            method: "POST",
            body: searchParams,
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            }
        })
        .then(r => {
            if (!r.ok) throw new Error('Data endpoint error.');
            return r.text();
        })
        .then(res => {
            Swal.fire({
                icon: 'success',
                title: 'Data Saved Successfully',
                showConfirmButton: false,
                timer: 2000
            });
            document.getElementById("beneficiaryForm").reset();
            initPrescriptionIdentifiers();
            updatePreview();
        })
        .catch(err => {
            Swal.fire({
                icon: 'error',
                title: 'Submission Error',
                text: 'Could not communicate with Google Sheet endpoint.'
            });
        });
    });

    function downloadPDF() {
        const element = document.getElementById("a4Prescription");
        
        const opt = {
            margin: 0,
            filename: 'Rx_Camp_' + document.getElementById("patientId").innerText + '.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { 
                scale: 2.5, 
                useCORS: true, 
                logging: false,
                letterRendering: true,
                scrollY: 0,
                scrollX: 0
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
            const totalPages = pdf.internal.getNumberOfPages();
            if (totalPages > 1) {
                for (let i = totalPages; i > 1; i--) {
                    pdf.deletePage(i);
                }
            }
        }).save();
    }

    // Lifecycle setup execution mappings
    initPrescriptionIdentifiers();
    updatePreview();
</script>

</body>
</html>
